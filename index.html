<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K.ONE</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Outfit", sans-serif;
  color: #1c3550;
  overflow-x: hidden;

  background:
    radial-gradient(circle at 50% -20%, rgba(255,255,255,0.95), transparent 40%),
    linear-gradient(to bottom, #6ec1ff 0%, #9fd8ff 30%, #d8f1ff 70%, #f7fcff 100%);
}

/* CLOUDS */
.cloud-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.cloud {
  position: absolute;
  opacity: 0.65;
  filter: blur(2px);
}

.cloud img {
  width: 100%;
  opacity: 0.85;
}

.cloud1 { top:10%; left:-20%; width:260px; animation: driftLR 60s linear infinite; }
.cloud2 { top:35%; left:-30%; width:340px; animation: driftLR 80s linear infinite; opacity:0.5; }
.cloud3 { top:65%; right:-25%; width:220px; animation: driftRL 70s linear infinite; }
.cloud4 { top:20%; right:-30%; width:300px; animation: driftRL 90s linear infinite; opacity:0.5; }

@keyframes driftLR { to { transform: translateX(160vw); } }
@keyframes driftRL { to { transform: translateX(-160vw); } }

/* PAGE */
.page {
  position: relative;
  z-index: 2;
  max-width: 520px;
  margin: auto;
  padding: 40px 16px;
  text-align: center;
}

/* HEADER */
h1 {
  margin: 0;
  font-size: 42px;
  letter-spacing: 6px;
  color: white;
}

.sub {
  margin-top: 6px;
  font-size: 13px;
  letter-spacing: 2px;
  color: #eaf6ff;
}

/* PROFILE */
.profile {
  margin: 30px 0;
}

.profile-pic {
  width: 120px;
  height: 120px;
  margin: auto;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

/* ICONS */
.icons {
  display:flex;
  justify-content:center;
  gap:14px;
  margin-top:12px;
}

.icon {
  width:42px;
  height:42px;
  border-radius:50%;
  background:rgba(255,255,255,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(6px);
  transition:0.2s;
}

.icon:hover {
  transform:translateY(-2px);
  background:white;
}

/* SECTIONS (FIXED CLEAN LOOK) */
.section {
  margin: 28px 0;
  padding: 22px;
  border-radius: 30px;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(12px);
}

/* LINKS */
.link {
  display:block;
  margin:10px 0;
  padding:14px;
  border-radius:999px;
  background: rgba(255,255,255,0.6);
  font-size:13px;
  transition:0.2s;
}

.link:hover {
  background:white;
  transform:translateY(-2px);
}

/* TRACK */
.track {
  padding: 40px 20px;
  color: #4d6c88;
}

/* WISDOM */
.wisdom-btn {
  margin-top:20px;
  padding:12px 16px;
  border:none;
  border-radius:999px;
  background:white;
  cursor:pointer;
  font-family:inherit;
}

.wisdom-box {
  margin-top:12px;
  font-style:italic;
  color:#3c5c78;
  min-height:40px;
}

/* FOOTER */
.footer {
  margin-top:30px;
  font-size:12px;
  color:#5c7d99;
}
</style>
</head>

<body>

<div class="cloud-layer">
  <div class="cloud cloud1" data-speed="0.08"><img src="cloud1.png"></div>
  <div class="cloud cloud2" data-speed="0.04"><img src="cloud2.png"></div>
  <div class="cloud cloud3" data-speed="-0.05"><img src="cloud3.png"></div>
  <div class="cloud cloud4" data-speed="-0.03"><img src="cloud1.png"></div>
</div>

<div class="page">

  <h1>K.ONE</h1>
  <div class="sub">New York 🕊️</div>

  <div class="profile">
    <div class="profile-pic">profile pic</div>

    <div class="icons">
      <a class="icon" href="https://www.instagram.com/k.oneeeeee/" target="_blank">IG</a>
      <a class="icon" href="#">SC</a>
      <a class="icon" href="#">BC</a>
    </div>
  </div>

  <div class="section">
    <a class="link" href="https://distrokid.com/hyperfollow/konewhosfault/youre-here-2/?utm_source=ig&utm_medium=social&utm_content=link_in_bio&fbclid=PAZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQMMjU2MjgxMDQwNTU4AAGno-wdZ4DUw2hczItrpJXS97poK9rY5ymWUEcGkWPQLBQXUDDPjyoGZ8tuXw8_aem_USGx5kb3wKH6q4ZaiXpyxg" target="_blank">
      pre-save / listen
    </a>

    <a class="link" href="https://www.instagram.com/k.oneeeeee/" target="_blank">
      instagram
    </a>
  </div>

  <div class="section track">
    soundcloud / spotify track
  </div>

  <div class="section">
    K.ONE is a New York-based DJ / producer with a bright, ethereal edge.
  </div>

  <!-- WISDOM -->
  <div class="section">
    <button class="wisdom-btn" id="wisdomBtn">receive wisdom</button>
    <div class="wisdom-box" id="wisdomBox"></div>
  </div>

  <div class="footer">
    made with html & bad decisions
  </div>

</div>

<script>
const wisdom = [
"he who compresses too early regrets later",
"the loudest track is rarely the strongest",
"what you remove defines the groove",
"if unsure, mute it",
"perfection is the enemy of pressure",
"the crowd remembers energy, not detail"
];

document.getElementById("wisdomBtn").onclick = () => {
  const line = wisdom[Math.floor(Math.random()*wisdom.length)];
  document.getElementById("wisdomBox").innerText = line;
};

/* PARALLAX */
window.addEventListener("scroll", () => {
  const y = window.scrollY;
  document.querySelectorAll(".cloud").forEach(c => {
    const speed = c.dataset.speed;
    c.style.transform = `translateY(${y * speed}px)`;
  });
});
</script>

</body>
</html>
